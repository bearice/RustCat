name: Rust Build and Test

on:
  push:
    branches:
      - master
  pull_request_target:
  workflow_dispatch:
  release:
    types: [created, edited]

permissions:
  # contents: write is required by softprops/action-gh-release to upload
  # assets to a GitHub release. Specifying any permission makes all others
  # default to none, so this must be listed explicitly.
  contents: write
  pull-requests: write

jobs:
  #run build first to populate caches
  build-windows:
    name: Build Windows binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - uses: actions-rs/cargo@v1
        with:
          command: build
          args: --workspace --all-targets --all-features --release

      - name: Check for release
        id: is-release
        shell: bash
        run: |
          unset IS_RELEASE
          if [[ $GITHUB_REF =~ ^refs/tags/v[0-9].* ]]; then IS_RELEASE='true'; fi
          echo "IS_RELEASE=${IS_RELEASE}" >> $GITHUB_OUTPUT

      - name: Artifact upload (Windows)
        uses: actions/upload-artifact@master
        with:
          name: rust_cat.exe
          path: target/release/rust_cat.exe

      - name: Publish archives and packages (Windows)
        uses: softprops/action-gh-release@v1
        if: steps.is-release.outputs.IS_RELEASE
        with:
          files: |
            target/release/rust_cat.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create universal macOS app bundle
  build-macos:
    name: Create universal macOS app bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Run macOS build script
        run: ./build_macos.sh

      - name: Check for release
        id: is-release
        shell: bash
        run: |
          unset IS_RELEASE
          if [[ $GITHUB_REF =~ ^refs/tags/v[0-9].* ]]; then IS_RELEASE='true'; fi
          echo "IS_RELEASE=${IS_RELEASE}" >> $GITHUB_OUTPUT

      - name: Upload universal app bundle
        uses: actions/upload-artifact@v4
        with:
          name: RustCat-universal.app.zip
          path: RustCat-universal.app.zip

      - name: Upload universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: RustCat-universal.dmg
          path: RustCat-universal.dmg

      - name: Publish universal macOS release
        uses: softprops/action-gh-release@v1
        if: steps.is-release.outputs.IS_RELEASE
        with:
          files: |
            RustCat-universal.app.zip
            RustCat-universal.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build Linux binary and produce distro packages:
  # portable .tar.gz, .deb, .rpm, and a portable AppImage.
  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Build release binary
        run: cargo build --release

      - name: Build portable tarball
        run: ./build_linux.sh

      - name: Install packaging tools
        run: |
          # cargo-deb builds .deb packages
          cargo install --locked cargo-deb
          # cargo-generate-rpm builds .rpm packages
          cargo install --locked cargo-generate-rpm

      - name: Build .deb
        run: cargo deb --no-strip --output RustCat-linux-x86_64.deb

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Stage .rpm artifact
        shell: bash
        run: |
          mkdir -p rpm-out
          cp target/generate-rpm/*.rpm rpm-out/RustCat-linux-x86_64.rpm

      - name: Build AppImage
        # Best-effort: linuxdeploy's CImg-based icon deploy cannot read .ico,
        # and the ubuntu runner ships no ImageMagick, so a pre-generated
        # rustcat.png is committed to the repo and used directly here. This
        # step is allowed to fail and its upload is lenient so a flaky
        # AppImage never blocks the core deb/rpm/tarball artifacts.
        continue-on-error: true
        shell: bash
        run: |
          set -e
          mkdir -p appimage/AppDir/usr/bin
          mkdir -p appimage/AppDir/usr/share/applications
          mkdir -p appimage/AppDir/usr/share/icons
          cp target/release/rust_cat appimage/AppDir/usr/bin/
          cp assets/rustcat.desktop appimage/AppDir/usr/share/applications/
          cp assets/rustcat.png appimage/AppDir/usr/share/icons/rustcat.png
          # AppImage desktop entry must point to the binary inside the AppDir
          sed -i 's|^Exec=.*|Exec=rust_cat|' appimage/AppDir/usr/share/applications/rustcat.desktop

          ARCH=$(uname -m)
          export VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          export OUTPUT=RustCat-${VERSION}-${ARCH}.AppImage
          wget -qO linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/latest/download/linuxdeploy-${ARCH}.AppImage
          chmod +x linuxdeploy
          # Some runners can't run nested AppImages directly; fall back to
          # extracting and running via the AppRun wrapper if FUSE is unavailable.
          if ! ./linuxdeploy --version >/dev/null 2>&1; then
            export APPIMAGE_EXTRACT_AND_RUN=1
          fi
          ./linuxdeploy --appdir appimage/AppDir \
            --desktop-file appimage/AppDir/usr/share/applications/rustcat.desktop \
            --icon-file appimage/AppDir/usr/share/icons/rustcat.png \
            --output appimage
          mv appimage/*.AppImage "${OUTPUT}"

      - name: Check for release
        id: is-release
        shell: bash
        run: |
          unset IS_RELEASE
          if [[ $GITHUB_REF =~ ^refs/tags/v[0-9].* ]]; then IS_RELEASE='true'; fi
          echo "IS_RELEASE=${IS_RELEASE}" >> $GITHUB_OUTPUT

      - name: Upload Linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: RustCat-linux-x86_64.tar.gz
          path: RustCat-*.tar.gz
          if-no-files-found: error

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: RustCat-linux-x86_64.deb
          path: RustCat-linux-x86_64.deb
          if-no-files-found: error

      - name: Upload Linux .rpm
        uses: actions/upload-artifact@v4
        with:
          name: RustCat-linux-x86_64.rpm
          path: rpm-out/RustCat-linux-x86_64.rpm
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: RustCat-x86_64.AppImage
          path: RustCat-*.AppImage
          if-no-files-found: ignore

      - name: Publish Linux release
        uses: softprops/action-gh-release@v1
        if: steps.is-release.outputs.IS_RELEASE
        with:
          files: |
            RustCat-*.tar.gz
            RustCat-linux-x86_64.deb
            rpm-out/RustCat-linux-x86_64.rpm
            RustCat-*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Auto-approve Dependabot PRs if build succeeds
  dependabot-auto-approve:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request_target'
    steps:
      - name: Auto-approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
